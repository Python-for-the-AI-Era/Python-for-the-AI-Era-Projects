version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: benchmark_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  fastapi_api:
    build: ./fastapi_app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/benchmark_db

  flask_api:
    build: ./flask_app
    command: gunicorn -w 4 -b 0.0.0.0:5000 app:app
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/benchmark_db

  django_api:
    build: ./django_app
    command: gunicorn -w 4 -b 0.0.0.0:8000 config.wsgi:application
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/benchmark_db

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fastapi_api
      - flask_api
      - django_api

volumes:
  pgdata: